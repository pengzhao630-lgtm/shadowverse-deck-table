<meta charset="UTF-8">

<title>影之诗卡组生涯表</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft Yahei",sans-serif}
body{background:#eee;padding:20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.container{background:#fff;padding:16px;width:100%;max-width:1200px}
.tip-text{color:#c0392b;text-align:center;margin-bottom:8px;font-size:14px}
h1{text-align:center;font-size:36px;margin-bottom:16px;color:#000;border-bottom:3px solid #000;padding-bottom:6px}

/* 多尺寸适配布局 */
.grid-wrap{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:0;
  border:2px solid #000;
  width:100%;
}
@media (max-width:900px) and (min-width:721px){
  .grid-wrap{grid-template-columns:repeat(3,1fr);}
}
@media (max-width:720px) and (min-width:421px){
  .grid-wrap{grid-template-columns:repeat(3,1fr);}
}
@media (max-width:420px){
  .grid-wrap{grid-template-columns:repeat(2,1fr);}
}

.cell-box{display:flex;flex-direction:column;border-right:2px solid #000;border-bottom:2px solid #000}
.grid-wrap .cell-box:nth-child(4n){border-right:none}
@media (max-width:900px){
  .grid-wrap .cell-box:nth-child(3n){border-right:none}
  .grid-wrap .cell-box:nth-child(4n){border-right:2px solid #000}
}
@media (max-width:420px){
  .grid-wrap .cell-box:nth-child(2n){border-right:none}
  .grid-wrap .cell-box:nth-child(3n){border-right:2px solid #000}
}

.cell-box:nth-last-child(-n+4){border-bottom:none}
@media (max-width:900px){
  .cell-box:nth-last-child(-n+3){border-bottom:none}
  .cell-box:nth-last-child(-n+4){border-bottom:2px solid #000}
}
@media (max-width:420px){
  .cell-box:nth-last-child(-n+2){border-bottom:none}
  .cell-box:nth-last-child(-n+3){border-bottom:2px solid #000}
}

.cell-content{
    width:100%;
    height:180px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    background:#f5f5f5;
}
@media (max-width:720px){
  .cell-content{height:140px;}
}
@media (max-width:420px){
  .cell-content{height:160px;}
}

.cell-content img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
.cell-content .text{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:14px 8px 10px;
    font-size:16px;
    font-weight:900;
    color:#ffffff;
    text-align:center;
    word-break:break-all;
    background:linear-gradient(to top, rgba(0,0,0,.75), rgba(0,0,0,.25) 60%, transparent);
    text-shadow:0 0 4px #000, 0 0 8px #000;
}
@media (max-width:720px){
  .label-text{font-size:14px;}
  .cell-content .text{font-size:14px;}
}
.label-text{text-align:center;padding:6px 2px;font-size:16px;border-top:2px solid #000;white-space:nowrap}
.btn-save{margin-top:24px;padding:10px 28px;font-size:18px;cursor:pointer}

/* 编辑弹窗样式 */
.modal-mask{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:10px;
}
.modal-box{
    background:#fff;
    padding:24px;
    border-radius:8px;
    width:460px;
    max-width:92vw;
    max-height:90vh;
    overflow-y:auto;
}
.modal-box h3{margin-bottom:16px}
.section-title{
    font-size:15px;
    font-weight:bold;
    margin:18px 0 10px;
    color:#222;
}
.section-title:first-of-type{margin-top:0;}
.form-item{margin-bottom:14px}
.form-item label{display:block;margin-bottom:4px}
.form-item input{width:100%;padding:6px;font-size:16px}
.modal-buttons{margin-top:20px;display:flex;gap:12px;justify-content:flex-end}
.modal-buttons button{padding:6px 16px;font-size:16px;cursor:pointer}
.search-input{margin-bottom:10px;}
.card-preset-wrap{
    display:grid;
    grid-template-columns: repeat(auto-fill, 76px);
    gap:10px;
    max-height:168px;
    overflow-y:auto;
    overflow-x:hidden;
    padding:6px 0;
}
.card-item{
    width:76px;
    display:flex;
    flex-direction:column;
    cursor:pointer;
    border:2px solid transparent;
    border-radius:6px;
    overflow:hidden;
    background:#ddd;
}
.card-item:hover{border-color:#4488ff;}
.card-item.selected{border-color:#2266dd;}
.card-img{width:100%;height:64px;object-fit:cover;display:block;}
.card-name{font-size:11px;text-align:center;padding:3px 2px;background:#fff;color:#222;line-height:1.2;word-break:break-all;}
.manual-edit-area{padding:12px;background:#f7f9fc;border-radius:6px;}

/* 预览弹窗样式 */
.preview-mask{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0.85);
    z-index:1000;
    align-items:center;
    justify-content:center;
    padding:16px;
}
.preview-box{
    background:#fff;
    padding:16px;
    border-radius:8px;
    max-width:96vw;
    max-height:96vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.preview-img{
    max-width:100%;
    width:auto;
    height:auto;
    margin-bottom:16px;
    border:1px solid #ccc;
    display:block;
}
.preview-buttons{
    display:flex;
    gap:12px;
}
.preview-buttons button{
    padding:8px 20px;
    font-size:16px;
    cursor:pointer;
}

/* QQ微信移动端遮罩 */
.mobile-mask{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:#fff;z-index:9999;display:none;
    align-items:center;justify-content:center;text-align:center;padding:24px;
}
.mobile-mask h3{color:#222;margin-bottom:12px;font-size:20px;}
.mobile-mask p{color:#666;font-size:16px;line-height:1.6;}
</style>
</head>
<body>
<div class="mobile-mask" id="envMask">
    <div>
        <h3>QQ/微信内置浏览器兼容性较差</h3>
        <p>请点击页面右上角【...】→ 在浏览器打开</p>
    </div>
</div>

<div class="container" id="capture-area">
    <div class="tip-text">⚠微信内复制/导出容易失效，建议使用系统浏览器</div>
    <h1>影之诗卡组生涯表</h1>
    <div class="grid-wrap" id="grid"></div>
</div>

<button class="btn-save" onclick="genPreview()">生成预览</button>

<!-- 编辑卡组弹窗 -->
<div class="modal-mask" id="modal">
    <div class="modal-box">
        <h3>编辑卡组信息</h3>
        <div class="section-title">快速选择卡组</div>
        <div class="form-item search-input">
            <input type="text" id="searchDeck" placeholder="自动筛选对应职业卡组">
        </div>
        <div class="card-preset-wrap" id="presetList"></div>
        <div class="section-title">手动编辑卡组</div>
        <div class="manual-edit-area">
            <div class="form-item">
                <label>卡组名称（必填）</label>
                <input type="text" id="inputName" placeholder="雪华妖">
            </div>
            <div class="form-item">
                <label>自定义上传图片</label>
                <input type="file" id="inputImg" accept="image/*">
            </div>
        </div>
        <div class="modal-buttons">
            <button onclick="closeModal()">取消</button>
            <button onclick="submitData()">确认</button>
        </div>
    </div>
</div>

<!-- 预览大图弹窗 -->
<div class="preview-mask" id="previewMask">
    <div class="preview-box">
        <img class="preview-img" id="previewImg">
        <div class="preview-buttons">
            <button onclick="copyPreviewImg()">复制图片</button>
            <button onclick="closePreview()">关闭</button>
        </div>
        <p style="margin-top:10px;color:#777;font-size:13px;">复制失败可长按图片保存</p>
    </div>
</div>

let currentEditCell = null;
let currentFilterKey = "";
let tempImageUrl = "";
let tempDeckName = "";
let previewDataUrl = "";
const presetWrap = document.getElementById('presetList');
const searchInput = document.getElementById('searchDeck');
const inputName = document.getElementById('inputName');
const previewMask = document.getElementById('previewMask');
const previewImg = document.getElementById('previewImg');

function renderPresetList(filterKey = ""){
    let list = presetCardList;
    if(filterKey) list = list.filter(item => item.name.includes(filterKey));
    presetWrap.innerHTML = "";
    list.forEach(card=>{
        const wrapDiv = document.createElement('div');
        wrapDiv.className = "card-item";
        wrapDiv.innerHTML = `<img class="card-img" crossOrigin="anonymous" ${card.url ? `src="${card.url}"` : ''}><div class="card-name">${card.name}</div>`;
        if(!card.url){
            wrapDiv.style.opacity = "0.6";
            wrapDiv.style.cursor = "not-allowed";
        }else{
            wrapDiv.onclick = ()=>{
                tempDeckName = card.name;
                tempImageUrl = card.url;
                inputName.value = card.name;
                document.querySelectorAll('.card-item').forEach(el=>el.classList.remove('selected'));
                wrapDiv.classList.add('selected');
            }
        }
        presetWrap.appendChild(wrapDiv);
    })
}

searchInput.addEventListener('input', function(){
    renderPresetList(this.value.trim());
});

const gridDom = document.getElementById('grid');
labelList.forEach(label=>{
    const box = document.createElement('div');
    box.className = 'cell-box';
    box.innerHTML = `
        <div class="cell-content">
            <div class="text"></div>
        </div>
        <div class="label-text">${label}</div>
    `;
    box.querySelector('.cell-content').onclick = ()=>{
        currentEditCell = box.querySelector('.cell-content');
        currentFilterKey = labelMap[label];
        openModal();
    };
    gridDom.appendChild(box);
})

const modal = document.getElementById('modal');
const inputImg = document.getElementById('inputImg');

function openModal(){
    modal.style.display = 'flex';
    const text = currentEditCell.querySelector('.text')?.textContent || "";
    const imgDom = currentEditCell.querySelector('img');
    if(imgDom) imgDom.crossOrigin = "anonymous";
    inputName.value = text;
    tempDeckName = text;
    tempImageUrl = imgDom?.src || "";
    inputImg.value = "";
    searchInput.value = currentFilterKey;
    renderPresetList(currentFilterKey);
    document.querySelectorAll('.card-item').forEach(el=>el.classList.remove('selected'));
}
function closeModal(){ modal.style.display = 'none'; }

inputImg.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt=>{
        tempImageUrl = evt.target.result;
        document.querySelectorAll('.card-item').forEach(el=>el.classList.remove('selected'));
    }
    reader.readAsDataURL(file);
}

function submitData(){
    const name = inputName.value.trim();
    if(!name){alert("请填写卡组名称！");return;}
    if(!currentEditCell) return;
    currentEditCell.innerHTML = `
        <img crossOrigin="anonymous" src="${tempImageUrl || ''}" onerror="this.style.display='none'">
        <div class="text">${name}</div>
    `;
    closeModal();
}

// 生成预览：临时隐藏按钮、提示，保证预览和填表版式完全一致
async function genPreview(){
    const dom = document.getElementById('capture-area');
    const btn = document.querySelector('.btn-save');
    const tipTextDom = document.querySelector('.tip-text');
    // 临时隐藏，不参与截图
    btn.style.visibility = 'hidden';
    tipTextDom.style.visibility = 'hidden';
    try {
        const canvas = await html2canvas(dom, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true,
            allowTaint: true,
            foreignObjectRendering: false,
            letterRendering:true,
            timeout: 20000
        });
        previewDataUrl = canvas.toDataURL("image/png");
        previewImg.src = previewDataUrl;
        previewMask.style.display = "flex";
    } catch (err) {
        alert("生成预览失败，请切换系统浏览器！");
        console.error(err);
    } finally {
        // 恢复显示
        btn.style.visibility = 'visible';
        tipTextDom.style.visibility = 'visible';
    }
}

// 复制预览图片
async function copyPreviewImg(){
    try {
        const res = await fetch(previewDataUrl);
        const blob = await res.blob();
        const item = new ClipboardItem({ "image/png": blob });
        await navigator.clipboard.write([item]);
        alert("图片已复制到剪贴板，可直接粘贴！");
    } catch (err) {
        alert("复制失败！请长按预览图片保存到相册");
    }
}

function closePreview(){
    previewMask.style.display = "none";
    previewDataUrl = "";
}
